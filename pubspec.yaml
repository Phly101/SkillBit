name: skill_bit
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:

    sdk: flutter

  # these are the logic and main packages:
  cupertino_icons: ^1.0.8
  internet_connection_checker: ^3.0.1
  equatable: ^2.0.8
  dartz: ^0.10.1
  shared_preferences: ^2.5.4
  get_it: ^9.2.0
  flutter_bloc: ^9.1.1
  dio: ^5.9.1

  # these are the UI packages:
  font_awesome_flutter: ^10.12.0
  introduction_screen: ^4.0.0
  lottie: ^3.3.2
  flutter_native_splash: ^2.4.7
  youtube_player_flutter: ^9.1.3
  fl_chart: ^1.1.1
  table_calendar: ^3.2.0
  percent_indicator: ^4.2.5

dev_dependencies:
  flutter_test:

    sdk: flutter
  flutter_lints: ^6.0.0




flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/

