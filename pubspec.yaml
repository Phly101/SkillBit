name: skill_bit
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:

    sdk: flutter

  # these are the logic and main packages:
  cupertino_icons: ^1.0.8
  internet_connection_checker: ^3.0.1
  equatable: ^2.0.8
  dartz: ^0.10.1
  shared_preferences: ^2.5.4
  get_it: ^9.2.1
  flutter_bloc: ^9.1.1
  dio: ^5.9.2
  go_router: ^17.1.0
  provider: ^6.1.5+1
  url_launcher: ^6.3.2
  stream_transform: ^2.1.1
  # these are the UI packages:
  font_awesome_flutter: ^10.12.0
  lottie: ^3.3.2
  flutter_native_splash: ^2.4.7
  youtube_player_flutter: ^9.1.3
  fl_chart: ^1.2.0
  table_calendar: ^3.2.0
  percent_indicator: ^4.2.5
  pinput: ^6.0.2
  smooth_page_indicator: ^2.0.1
  flutter_svg: ^2.2.4
  flutter_svg_provider: ^1.0.7
  shimmer_flutter: ^1.0.1
  easy_stepper: ^1.0.1





dev_dependencies:
  flutter_test:

    sdk: flutter
  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/images/logos/
    - assets/images/course_images/
    - assets/animations/
    - assets/json/
fonts:
  - family: Poppins
    fonts:
      - asset: assets/fonts/poppins/Poppins-Regular.ttf
      - asset: assets/fonts/poppins/Poppins-Bold.ttf
        weight: 700

  - family: Inter
    fonts:
      - asset: assets/fonts/Inter/Inter_18pt-Regular.ttf
      - asset: assets/fonts/Inter/Inter_18pt-Bold.ttf
      - asset: assets/fonts/Inter/Inter_24pt-Regular.ttf
      - asset: assets/fonts/Inter/Inter_24pt-Bold.ttf



  - family: Lexend
    fonts:
      - asset: assets/fonts/Lexend-Regular.ttf
      - asset: assets/fonts/Lexend-Bold.ttf
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
